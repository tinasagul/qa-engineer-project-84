- summary: |
 При попытке оформить заказ в Devtools на вкладке сеть отображается ошибка 
  environment: |
   Google Chrome  
    MacOS
  steps-to-reproduce: |
  1. На странице интернет-магазина добавить любой товар в корзину 
  2. Перейти в корзину 
  3. Нажать кнопку "Оформить заказ" 
  4. Перейти в Devtools, на вкладке Network появляется ошибка 
  expected-result: |
    в Devtools видно, что заказ был оформлен, и отсутствует ошибка 500
  actual-result: |
   При нажатии кнопки "Оформить заказ", в Devtools появляется ошибка 500 
